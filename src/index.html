<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ZikWidgetTester</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Third-party assets required by Zik Route Widget -->
  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
  <link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <!-- Zik Route Widget Assets (loaded dynamically to bypass Vite pre-transform) -->
  <link rel="stylesheet" href="/zik-widget/styles.css" />
  <script>
    (function() {
      var widgetBase = '/zik-widget/';

      function loadScript(src, opts) {
        var s = document.createElement('script');
        s.src = widgetBase + src;
        if (opts && opts.module) { s.type = 'module'; }
        if (opts && opts.noModule) { s.noModule = true; }
        if (!opts || opts.defer !== false) { s.defer = true; }
        document.head.appendChild(s);
      }

      loadScript('polyfills-es5.js', { noModule: true });
      loadScript('polyfills-es2015.js', { module: true });
      loadScript('scripts.js');
      loadScript('main-es2015.js', { module: true });
      loadScript('main-es5.js', { noModule: true });
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
